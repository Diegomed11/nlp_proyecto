# Triaje automático de issues (NLP) — copiar a .github/workflows/triage.yml del repo destino.
# En cada issue nuevo: predice el módulo con el baseline (numpy) y, si la confianza es alta,
# le pone el label. Lo dudoso queda para el maintainer (asistente, no automatización total).
name: NLP issue triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias (solo numpy en producción)
        run: pip install numpy

      - name: Predecir módulo
        id: predict
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CONF_THRESHOLD: "0.9"
        run: python -m action.label_issue

      - name: Aplicar labels de alta confianza
        if: steps.predict.outputs.labels != '[]'
        uses: actions/github-script@v7
        env:
          LABELS: ${{ steps.predict.outputs.labels }}
        with:
          script: |
            const labels = JSON.parse(process.env.LABELS || '[]');
            if (labels.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
            }
